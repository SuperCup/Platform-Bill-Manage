<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>账单管理</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <div class="layout">
        <aside class="sidenav">
          <nav class="sidenav-systems" id="sidenav-systems" aria-label="模块切换"></nav>
          <div class="sidenav-group">
            <nav class="sidenav-pages" id="sidenav-pages" aria-label="功能菜单"></nav>
          </div>
        </aside>

        <main class="content">
          <div class="page" id="page"></div>
        </main>
      </div>

      <div class="toast-host" id="toast-host"></div>

      <div class="modal-backdrop hidden" id="modal-backdrop" aria-hidden="true">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
          <div class="modal-header">
            <div class="modal-title" id="modal-title">弹窗</div>
            <button class="icon-btn" id="modal-close" title="关闭">×</button>
          </div>
          <div class="modal-body" id="modal-body"></div>
          <div class="modal-footer" id="modal-footer"></div>
        </div>
      </div>

      <div class="drawer-backdrop hidden" id="drawer-backdrop" aria-hidden="true">
        <div class="drawer" role="dialog" aria-modal="true" aria-labelledby="drawer-title">
          <div class="drawer-header">
            <div class="drawer-title" id="drawer-title">详情</div>
            <div class="drawer-header-actions" id="drawer-actions"></div>
            <button class="icon-btn" id="drawer-close" title="关闭">×</button>
          </div>
          <div class="drawer-body" id="drawer-body"></div>
        </div>
      </div>
    </div>

    <script type="module" src="./main.js?v=20260518c"></script>
  </body>
</html>
